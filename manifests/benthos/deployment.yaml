apiVersion: v1
kind: ConfigMap
metadata:
  name: benthos-config
  namespace: benthos
data:
  benthos.yaml: |
    http:
      address: 0.0.0.0:4195
      enabled: true
    
    input:
      type: mqtt
      mqtt:
        urls:
          - tcp://emqx.emqx.svc.cluster.local:1883
        topics:
          - sensors/#
        client_id: benthos-consumer
        qos: 1
    
    pipeline:
      processors: []
    
    output:
      type: nats
      nats:
        urls:
          - nats://nats.nats.svc.cluster.local:4222
        subject: iot.data
        
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: benthos
  namespace: benthos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: benthos
  template:
    metadata:
      labels:
        app: benthos
    spec:
      containers:
      - name: benthos
        image: jeffail/benthos:4.1.0
        ports:
        - containerPort: 4195
          name: http
        volumeMounts:
        - name: config
          mountPath: /benthos.yaml
          subPath: benthos.yaml
        livenessProbe:
          httpGet:
            path: /ping
            port: 4195
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 4195
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: benthos-config
      nodeSelector:
        kubernetes.io/arch: arm64
      tolerations:
      - key: "arm"
        operator: "Exists"
        effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: benthos
  namespace: benthos
spec:
  ports:
  - port: 4195
    targetPort: 4195
    name: http
  selector:
    app: benthos

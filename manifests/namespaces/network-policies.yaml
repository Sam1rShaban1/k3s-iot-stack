---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: emqx-network-policy
  namespace: emqx
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: emqx
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: logging
        - namespaceSelector:
            matchLabels:
              name: benthos
      ports:
        - protocol: TCP
          port: 1883
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 18083
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: benthos
      ports:
        - protocol: TCP
          port: 1883
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-network-policy
  namespace: nats
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nats
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: benthos
        - namespaceSelector:
            matchLabels:
              name: nats-consumer
        - namespaceSelector:
            matchLabels:
              name: otel-collector
      ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 6222
  egress:
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: benthos-network-policy
  namespace: benthos
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: benthos
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: emqx
      ports:
        - protocol: TCP
          port: 4195
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: nats
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - namespaceSelector:
            matchLabels:
              name: victoriametrics
      ports:
        - protocol: TCP
          port: 8428
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: victoriametrics-network-policy
  namespace: victoriametrics
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: victoria-metrics-single
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
        - namespaceSelector:
            matchLabels:
              name: benthos
        - namespaceSelector:
            matchLabels:
              name: nats-consumer
      ports:
        - protocol: TCP
          port: 8428
  egress:
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-network-policy
  namespace: monitoring
spec:
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: victoriametrics
      ports:
        - protocol: TCP
          port: 8428
    - to:
        - namespaceSelector:
            matchLabels:
              name: logging
      ports:
        - protocol: TCP
          port: 3100
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

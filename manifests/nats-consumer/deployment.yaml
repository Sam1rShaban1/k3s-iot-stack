apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-consumer
  namespace: nats-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats-consumer
  template:
    metadata:
      labels:
        app: nats-consumer
    spec:
      containers:
      - name: nats-consumer
        image: python:3.11-slim
        command: ["python3", "-c"]
        args:
          - |
            from http.server import HTTPServer, BaseHTTPRequestHandler
            import threading
            import time
            
            class HealthHandler(BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200)
                    self.end_headers()
                    self.wfile.write(b'OK')
                def log_message(self, format, *args):
                    pass
            
            print("Starting health server on port 8080...")
            server = HTTPServer(('0.0.0.0', 8080), HealthHandler)
            thread = threading.Thread(target=server.serve_forever)
            thread.daemon = True
            thread.start()
            print("Health server started. Waiting for messages...")
            while True:
                time.sleep(30)
                print(f"[{time.strftime('%H:%M:%S')}] Still running...")
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      nodeSelector:
        kubernetes.io/arch: arm64
      tolerations:
      - key: "arm"
        operator: "Exists"
        effect: "NoSchedule"

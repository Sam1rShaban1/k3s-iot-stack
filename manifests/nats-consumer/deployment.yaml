apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-consumer
  namespace: nats-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats-consumer
  template:
    metadata:
      labels:
        app: nats-consumer
    spec:
      containers:
      - name: nats-consumer
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            pip install --no-cache-dir nats-py requests &&
            python3 -u -c '
            import asyncio
            import json
            import time
            import os
            import requests
            from nats.aio.client import Client as NATS

            NATS_URL = os.getenv("NATS_URL", "nats://nats.nats.svc.cluster.local:4222")
            VM_URL = os.getenv("VICTORIA_METRICS_URL", "http://victoriametrics-victoria-metrics-single-server.victoriametrics.svc.cluster.local:8428/api/v1/import/prometheus")
            STREAM = "IOT_DATA"
            SUBJECT = "iot.data"
            CONSUMER_PUSH = "metrics-consumer-push"
            DELIVERY_SUBJECT = "iot.consumer.delivery"

            async def setup():
                nc = NATS()
                await nc.connect(NATS_URL)
                js = nc.jetstream()
                for i in range(10):
                    try:
                        await js.add_stream(name=STREAM, subjects=[SUBJECT])
                        print("Stream: " + STREAM)
                        break
                    except Exception as e:
                        print(f"Stream attempt {i+1} failed: {e}")
                        await asyncio.sleep(1)
                return nc, js

            def send_vm(data):
                try:
                    nats_exit_ts = int(time.time() * 1000)
                    data["nats_exit_ts"] = nats_exit_ts
                    if "ts" in data:
                        data["end_to_end_latency_ms"] = nats_exit_ts - data["ts"]
                    
                    metrics = []
                    for k, v in data.items():
                        if isinstance(v, (int, float)):
                            device = data.get("device_id", "unknown")
                            metrics.append("iot_sensor_{key}{{device_id=\"{dev}\"}} {val}".format(key=k, dev=device, val=v))
                    
                    if metrics:
                        resp = requests.post(VM_URL, data="\n".join(metrics), 
                                           headers={"Content-Type": "text/plain"}, timeout=5)
                        if resp.status_code in [200, 204]:
                            print("VM: sent " + str(len(metrics)) + " metrics for " + str(data.get("device_id", "unknown")))
                        else:
                            print("VM error: " + str(resp.status_code) + " " + resp.text[:100])
                except Exception as e:
                    print("VM error: " + str(e))

            async def h(msg):
                try:
                    d = json.loads(msg.data.decode())
                    print("MSG: " + str(d.get("device_id")))
                    send_vm(d)
                    await msg.ack()
                except Exception as e:
                    print("Err: " + str(e))
                    await msg.nak()
            
            async def main():
                print("Starting NATS consumer...")
                nc, js = await setup()
                print("Creating push consumer...")
                await asyncio.sleep(1)
                try:
                    await js.add_consumer(STREAM, durable_name=CONSUMER_PUSH, 
                                        deliver_subject=DELIVERY_SUBJECT, ack_policy="explicit")
                    print("Push consumer created")
                except Exception as e:
                    print(f"Push consumer error (may exist): {e}")
                print("Subscribing to " + DELIVERY_SUBJECT)
                sub = await nc.subscribe(DELIVERY_SUBJECT)
                async for msg in sub.messages:
                    await h(msg)

            asyncio.run(main())
            '
        env:
        - name: NATS_URL
          value: "nats://nats.nats.svc.cluster.local:4222"
        - name: VICTORIA_METRICS_URL
          value: "http://victoriametrics-victoria-metrics-single-server.victoriametrics.svc.cluster.local:8428/api/v1/import/prometheus"
        - name: PYTHONUNBUFFERED
          value: "1"
      nodeSelector:
        kubernetes.io/arch: arm64
      tolerations:
      - key: "arm"
        operator: "Exists"
        effect: "NoSchedule"

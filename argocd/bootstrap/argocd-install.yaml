apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argo-helm
    targetRevision: argo-cd-5.53.0
    chart: argo-cd
    helm:
      releaseName: argocd
      parameters:
      - name: server.service.type
        value: LoadBalancer
      - name: server.service.loadBalancerIP
        value: 192.168.1.243
      - name: server.configs.params.server.insecure
        value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argo-helm
    targetRevision: argo-cd-5.53.0
    path: charts/argo-cd
    helm:
      releaseName: argocd
      values:
        server:
          service:
            type: LoadBalancer
            loadBalancerIP: 192.168.1.243
        configs:
          params:
            server.insecure: "true"
        crds:
          install: true
          keep: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

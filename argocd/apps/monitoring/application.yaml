apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/prometheus-community/helm-charts
    targetRevision: kube-prometheus-stack-55.9.0
    path: charts/kube-prometheus-stack
    helm:
      releaseName: monitoring
      parameters:
      - name: prometheusOperator.admissionWebhooks.enabled
        value: "false"
      - name: prometheusOperator.admissionWebhooks.certManager.enabled
        value: "false"
      - name: prometheusOperator.admissionWebhooks.patch.enabled
        value: "false"
      - name: alertmanager.enabled
        value: "false"
      - name: prometheusOperator.tls.enabled
        value: "false"
      - name: prometheusOperator.tlsSecret
        value: ""
      - name: grafana.sidecar.dashboards.enabled
        value: "true"
      - name: grafana.sidecar.dashboards.label
        value: grafana_dashboard
      - name: grafana.sidecar.datasources.enabled
        value: "true"
      - name: grafana.sidecar.datasources.defaultDatasourceEnabled
        value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
  - group: "*"
    kind: "*"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true
    - ServerSideApply=true

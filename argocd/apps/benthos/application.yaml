apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: benthos
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: https://benthosdev.github.io/charts
    targetRevision: 0.6.0
    chart: benthos
    helm:
      releaseName: benthos
      parameters:
        - name: replicaCount
          value: "1"
        - name: persistence.enabled
          value: "false"
      values: |
        replicaCount: 1
        persistence:
          enabled: false
        config:
          http:
            address: 0.0.0.0:4195
            enabled: true
          input:
            generate:
              mapping: 'root = {"message": "hello"}'
              interval: 30s
          output:
            stdout:
              codec: lines
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
        - key: "arm"
          operator: "Exists"
          effect: "NoSchedule"
  destination:
    server: https://kubernetes.default.svc
    namespace: benthos
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

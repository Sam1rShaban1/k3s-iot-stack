apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/grafana/helm-charts
    targetRevision: tempo-1.3.1
    path: charts/tempo
    helm:
      releaseName: tempo
      values:
        tempo:
          retention: 30d
          search_enabled: true
          metrics_generator_enabled: true
          multitenancy_enabled: false
          overrides:
            global:
              metrics_generator:
                processors:
                  - service-graphs
                  - span-metrics
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
              wal:
                path: /var/tempo/wal
          configuration:
            overrides:
              per_tenant_override_config: /tempo/overrides.yaml
            server:
              http_listen_port: 3100
              grpc_listen_port: 9095
            distributor:
              receivers:
                otlp:
                  protocols:
                    grpc:
                      endpoint: 0.0.0.0:4317
                    http:
                      endpoint: 0.0.0.0:4318
                jaeger:
                  protocols:
                    grpc:
                      endpoint: 0.0.0.0:14250
                    thrift_http:
                      endpoint: 0.0.0.0:14268
                zipkin:
                  endpoint: 0.0.0.0:9411
            ingester:
              max_block_bytes: 1048576
              max_block_duration: 1h
              flush_check_period: 30s
              flush_all_blocks: true
            compactor:
              compaction:
                compaction_window: 1h
                max_block_bytes: 1048576
                block_retention: 30d
            querier:
              frontend_worker:
                frontend_address: tempo-query-frontend:9095
        server:
          replicas: 1
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 600m
              memory: 1Gi
        distributor:
          replicas: 1
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
        ingester:
          replicas: 1
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
        querier:
          replicas: 1
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
        queryFrontend:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        metricsGenerator:
          replicas: 1
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
        gateway:
          enabled: true
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        persistence:
          enabled: true
          storageClass: longhorn
          size: 15Gi
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
        - key: "arm"
          operator: "Exists"
          effect: "NoSchedule"
        serviceMonitor:
          enabled: true
          namespace: logging
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nats-io/nats-server
    targetRevision: v0.19.0
    path: helm/charts/nats
    helm:
      releaseName: nats
      valuesFiles:
        - ../../files/nats-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nats
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

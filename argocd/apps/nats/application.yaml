apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://nats-io.github.io/k8s/helm/charts
    targetRevision: 2.12.5
    chart: nats
    helm:
      releaseName: nats
      values: |
        replicaCount: 1
        config:
          cluster:
            enabled: false
          jetstream:
            enabled: true
            fileStore:
              enabled: true
              pvc:
                enabled: true
                storageClassName: longhorn
                size: 2Gi
            memoryStore:
              enabled: true
              maxSize: 128Mi
          mqtt:
            enabled: true
            port: 1883
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        service:
          type: ClusterIP
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
        - key: "arm"
          operator: "Exists"
          effect: "NoSchedule"
  destination:
    server: https://kubernetes.default.svc
    namespace: nats
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

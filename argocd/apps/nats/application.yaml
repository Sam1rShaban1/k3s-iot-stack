apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://nats-io.github.io/k8s/helm/charts
    targetRevision: 2.12.5
    chart: nats
    helm:
      releaseName: nats
      values: |
        replicaCount: 1
        jetstream:
          enabled: true
          fileStore:
            enabled: true
            storageClass: local-path
            storageSize: 2Gi
          memoryStore:
            enabled: true
            maxSize: 512Mi
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        nats:
          image: nats:2.10.15-alpine
          cluster:
            enabled: false
          mqtt:
            enabled: true
            port: 1883
          config:
            jetstream:
              enabled: true
              maxMem: 128MB
              maxFile: 1GB
              storeDir: /data/jetstream
        service:
          type: ClusterIP
        persistence:
          enabled: true
          storageClass: local-path
          size: 2Gi
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
        - key: "arm"
          operator: "Exists"
          effect: "NoSchedule"
  destination:
    server: https://kubernetes.default.svc
    namespace: nats
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

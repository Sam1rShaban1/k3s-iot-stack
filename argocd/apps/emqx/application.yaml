apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: emqx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/emqx/emqx-helm-charts
    targetRevision: main
    path: charts/emqx
  destination:
    server: https://kubernetes.default.svc
    namespace: emqx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

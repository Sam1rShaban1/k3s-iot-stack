apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats-consumer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Sam1rShaban1/k3s-iot-stack
    targetRevision: main
    path: manifests/nats-consumer
  destination:
    server: https://kubernetes.default.svc
    namespace: nats-consumer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/grafana/loki
    targetRevision: v2.9.4
    path: production/helm/loki
    helm:
      releaseName: loki
      values:
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
            filesystem:
              chunks_directory: /loki/chunks
              rules_directory: /loki/rules
          schema_config:
            configs:
              - from: 2020-10-24
                store: boltdb-shipper
                object_store: filesystem
                schema: v11
                index:
                  prefix: index_
                  period: 24h
          chunk_store_config:
            max_look_back_period: 0s
            chunk_target_size: 1048576
            chunk_cache_size: 512Mi
          table_manager:
            retention_deletes_enabled: true
            retention_period: 30d
          limits_config:
            enforce_metric_name: false
            reject_old_samples: true
            reject_old_samples_max_age: 168h
            max_cache_freshness_per_query: 10m
            split_queries_by_interval: 15m
          compactor:
            working_directory: /loki/compactor
            shared_store: filesystem
            compaction_interval: 10m
            retention_enabled: true
            delete_request_cancel_period: 24h
            retention_delete_delay: 2h
          ingester:
            lifecycler:
              address: 127.0.0.1
              ring:
                kvstore:
                  store: inmemory
                  replication_factor: 1
              final_sleep: 0s
              num_tokens: 512
            chunk_idle_period: 1h
            max_chunk_age: 1h
            chunk_target_size: 1048576
            chunk_retain_period: 30s
          server:
            http_listen_port: 3100
            grpc_listen_port: 9096
          memberlist:
            join_members:
              - loki-headless
        backend:
          replicas: 1
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        read:
          replicas: 1
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        write:
          replicas: 1
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        gateway:
          enabled: true
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ingress:
            enabled: false
        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 600m
              memory: 1Gi
        persistence:
          enabled: true
          storageClass: longhorn
          size: 10Gi
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
        - key: "arm"
          operator: "Exists"
          effect: "NoSchedule"
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

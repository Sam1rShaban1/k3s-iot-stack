apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/grafana/loki
    targetRevision: v2.9.4
    path: production/helm/promtail
    helm:
      releaseName: promtail
      values: |
        config:
          server:
            http_listen_port: 3101
            grpc_listen_port: 9095
          positions:
            filename: /tmp/positions.yaml
          clients:
            - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push
          scrape_configs:
            # K3s cluster logs
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scrape
                  action: keep
                  regex: true
                - source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_path
                  action: replace
                  target_label: __path__
                  regex: (.+)
                - source_labels:
                    - __meta_kubernetes_pod_container_name
                  action: replace
                  target_label: container
                - source_labels:
                    - __meta_kubernetes_pod_name
                  action: replace
                  target_label: pod
                - source_labels:
                    - __meta_kubernetes_namespace
                  action: replace
                  target_label: namespace
                - source_labels:
                    - __meta_kubernetes_pod_label_app_kubernetes_io_name
                  action: replace
                  target_label: app
                - source_labels:
                    - __meta_kubernetes_pod_label_app
                  action: replace
                  target_label: app
                - source_labels:
                    - __meta_kubernetes_pod_label_component
                  action: replace
                  target_label: component
                - source_labels:
                    - __meta_kubernetes_pod_node_name
                  action: replace
                  target_label: node
            # IoT service specific logs
            - job_name: iot-services
              static_configs:
                - targets:
                    - localhost
                  labels:
                    job: iot-services
                    __path__: /var/log/containers/*emqx*.log
                - targets:
                    - localhost
                  labels:
                    job: iot-services
                    __path__: /var/log/containers/*benthos*.log
                - targets:
                    - localhost
                  labels:
                    job: iot-services
                    __path__: /var/log/containers/*nats*.log
                - targets:
                    - localhost
                  labels:
                    job: iot-services
                    __path__: /var/log/containers/*victoria-metrics*.log
            # System logs
            - job_name: system-logs
              static_configs:
                - targets:
                    - localhost
                  labels:
                    job: system
                    __path__: /var/log/syslog
                - targets:
                    - localhost
                  labels:
                    job: system
                    __path__: /var/log/kern.log
            # K3s components
            - job_name: k3s-components
              static_configs:
                - targets:
                    - localhost
                  labels:
                    job: k3s
                    component: kubelet
                    __path__: /var/log/kubelet.log
                - targets:
                    - localhost
                  labels:
                    job: k3s
                    component: k3s
                    __path__: /var/log/k3s.log
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 400m
            memory: 512Mi
        serviceMonitor:
          enabled: true
          namespace: logging
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
        - key: "arm"
          operator: "Exists"
          effect: "NoSchedule"
        # Deploy on all nodes for complete log collection
        daemonset:
          useHostNetwork: true
          useHostPort: false
        # Mount host paths for log access
        volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true

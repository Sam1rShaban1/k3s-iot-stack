# NATS configuration for single-node Pi cluster
replicaCount: 1

# NATS JetStream configuration
jetstream:
  enabled: true
  fileStore:
    enabled: true
    storageClass: local-path
    storageSize: 2Gi
  memoryStore:
    enabled: true
    maxSize: 512Mi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# NATS configuration
nats:
  image: nats:2.10.15-alpine
  port: 4222
  monitorPort: 8222
  httpPort: 8222
  cluster:
    enabled: false  # Disabled for single node
  
  # JetStream specific settings
  jetstream:
    enabled: true
    storeDir: /data/jetstream
    maxMemoryStore: 512Mi
    maxFileStore: 2Gi
    
  # MQTT gateway for IoT compatibility
  mqtt:
    enabled: true
    port: 1883
    tls:
      enabled: false
    ack_wait: 30s
    max_qos: 2

# Service configuration
service:
  type: ClusterIP
  ports:
    client: 4222
    cluster: 6222
    monitor: 8222
    mqtt: 1883

# Persistence for JetStream
persistence:
  enabled: true
  storageClass: local-path
  size: 2Gi

# Pi optimizations
nodeSelector:
  kubernetes.io/arch: arm64

tolerations:
- key: "arm"
  operator: "Exists"
  effect: "NoSchedule"

# Security context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Performance configuration
config:
  logtime: true
  logtime_utc: true
  debug: false
  trace: false
  max_connections: 1000
  max_payload: 1048576  # 1MB

# Health checks
livenessProbe:
  httpGet:
    path: /varz
    port: 8222
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /varz
    port: 8222
  initialDelaySeconds: 10
  periodSeconds: 5

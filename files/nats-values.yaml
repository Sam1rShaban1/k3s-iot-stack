replicaCount: 3

# NATS JetStream configuration
jetstream:
  enabled: true
  fileStore:
    enabled: true
    storageClass: longhorn
    storageSize: 8Gi
  memoryStore:
    enabled: true
    maxSize: 2Gi

resources:
  requests:
    cpu: 300m
    memory: 384Mi
  limits:
    cpu: 600m
    memory: 768Mi

# NATS configuration
nats:
  image: nats:2.10.15-alpine
  port: 4222
  monitorPort: 8222
  httpPort: 8222
  cluster:
    enabled: true
    name: nats-cluster
    replicas: 3
    # Cluster optimizations for gigabit network
    noAdvertise: false
    routes:
      - nats://nats-0.nats-headless.nats.svc.cluster.local:6222
      - nats://nats-1.nats-headless.nats.svc.cluster.local:6222
      - nats://nats-2.nats-headless.nats.svc.cluster.local:6222
  
  # JetStream specific settings
  jetstream:
    enabled: true
    storeDir: /data/jetstream
    maxMemoryStore: 2Gi
    maxFileStore: 8Gi
    # Performance optimizations
    maxOutstandingAcks: 1000
    maxAckPending: 10000
    maxBytes: 1GB
    maxAge: "24h"
    
  # MQTT gateway for IoT compatibility
  mqtt:
    enabled: true
    port: 1883
    tls:
      enabled: false
    ack_wait: 30s
    max_qos: 2

# Service configuration
service:
  type: ClusterIP
  ports:
    client: 4222
    cluster: 6222
    monitor: 8222
    mqtt: 1883

# Persistence for JetStream
persistence:
  enabled: true
  storageClass: longhorn
  size: 8Gi

# Pi4 optimizations
nodeSelector:
  kubernetes.io/arch: arm64

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: app.kubernetes.io/name
          operator: In
          values:
          - nats
      topologyKey: kubernetes.io/hostname

tolerations:
- key: "arm"
  operator: "Exists"
  effect: "NoSchedule"

# Security context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Performance configuration
config:
  logtime: true
  logtime_utc: true
  debug: false
  trace: false
  # Network optimizations
  max_connections: 65536
  max_payload: 1048576  # 1MB
  max_control_line: 524288
  ping_interval: "2m"
  ping_max: 2
  write_deadline: "2s"
  # JetStream performance
  jetstream:
    max_file_size: 104857600  # 100MB
    sync_interval: "30s"
    compact_interval: "5m"

# Priority class for critical messaging service
priorityClassName: system-cluster-critical

# Health checks
livenessProbe:
  httpGet:
    path: /varz
    port: 8222
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /varz
    port: 8222
  initialDelaySeconds: 10
  periodSeconds: 5

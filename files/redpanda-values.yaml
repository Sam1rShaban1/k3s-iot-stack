replicaCount: 3

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

configuration:
  developerMode: false
  rpk:
    seedServers:
      - host: "redpanda-0.redpanda.redpanda.svc.cluster.local"
        port: 33145
      - host: "redpanda-1.redpanda.redpanda.svc.cluster.local"
        port: 33145
      - host: "redpanda-2.redpanda.redpanda.svc.cluster.local"
        port: 33145
    autoCreateTopics: true
  redpanda:
    default_topic_partitions: 3
    default_topic_replications: 2
    storage_min_free_bytes: 5Gi
    log_segment_size: 134217728  # 128MB
    enable_transactions: true
    enable_idempotence: true
    batch_max_bytes: 1048576  # 1MB
    fetch_max_bytes: 5242880   # 5MB

persistence:
  enabled: true
  size: 8Gi
  storageClass: longhorn

statefulset:
  podManagementPolicy: Parallel

service:
  type: ClusterIP
  ports:
    kafka: 9092
    admin: 9644

nodeSelector:
  kubernetes.io/arch: arm64

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: app.kubernetes.io/name
          operator: In
          values:
          - redpanda
      topologyKey: kubernetes.io/hostname

tolerations:
- key: "arm"
  operator: "Exists"
  effect: "NoSchedule"

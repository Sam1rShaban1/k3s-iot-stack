replicaCount: 3

service:
  type: ClusterIP
  ports:
    http: 4195   # Benthos HTTP API
    grpc: 4196

resources:
  requests:
    cpu: 400m
    memory: 384Mi
  limits:
    cpu: 800m
    memory: 768Mi

persistence:
  enabled: false   # messages handled in memory

# Benthos configuration for IoT data pipeline
config: |
  input:
    mqtt:
      urls: ["tcp://emqx.emqx.svc.cluster.local:1883"]
      topics: ["iot/sensors/+"]
      qos: 2
      client_id: "benthos-${HOSTNAME}"
      clean_session: true
      # Performance optimizations
      max_in_flight: 100
      backoff:
        max_elapsed_time: 30s
        max_interval: 5s
      
  pipeline:
    # Thread pool for parallel processing
    threads: 4
    processors:
      - bloblang: |
          # Add Benthos entry timestamp
          root.benthos_entry_ts = now()
          root.benthos_pod = "${HOSTNAME}"
          
      - json_schema:
          schema: |
            {
              "type": "object",
              "properties": {
                "sensor_id": {"type": "string"},
                "timestamp": {"type": "integer"},
                "value": {"type": "number"},
                "unit": {"type": "string"}
              },
              "required": ["sensor_id", "timestamp", "value"]
            }
            
      - bloblang: |
          # Add processing metadata
          root.processed_at = now()
          root.cluster = "pi-cluster"
          root.benthos_processing_start = now()
          
      - bloblang: |
          # Calculate latency from sensor to Benthos
          sensor_ts = root.timestamp
          current_ts = now()
          root.latency_sensor_to_benthos_ms = current_ts - sensor_ts
          
      - bloblang: |
          # Add Benthos exit timestamp
          root.benthos_exit_ts = now()
          root.benthos_processing_duration_ms = root.benthos_exit_ts - root.benthos_processing_start
          
  output:
    nats_jetstream:
      urls: ["nats://nats.nats.svc.cluster.local:4222"]
      subject: "iot.data"
      stream: "iot-data-stream"
      jetstream:
        ack_wait: "30s"
        max_retries: 3
      # Performance batching for high throughput
      batching:
        count: 500
        period: 2s
        processors:
          - archive:
              format: json_array
      # Connection pooling
      max_in_flight: 50

nodeSelector:
  kubernetes.io/arch: arm64

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - benthos
        topologyKey: kubernetes.io/hostname

tolerations:
- key: "arm"
  operator: "Exists"
  effect: "NoSchedule"

# Priority class for processing service
priorityClassName: system-node-critical

# Performance tuning
livenessProbe:
  httpGet:
    path: /ready
    port: 4195
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: 4195
  initialDelaySeconds: 10
  periodSeconds: 5

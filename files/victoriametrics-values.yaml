replicaCount: 1

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

persistence:
  enabled: true
  storageClass: longhorn
  size: 15Gi

service:
  type: ClusterIP
  ports:
    http: 8428
    grpc: 8429

# Single-node mode optimized for Pi4
extraArgs:
  - --retentionPeriod=30d
  - --memory.allowedPercent=40
  - --storageDataPath=/data
  - --httpListenAddr=:8428
  - --loggerLevel=info
  - --loggerTimezone=UTC
  - --search.maxQueryDuration=30s
  - --search.maxUniqueTimeseries=1000000
  - --search.maxSeriesPerQuery=100000
  - --search.maxQueryLen=16000
  - --search.maxConcurrentRequests=100
  - --search.maxPointsPerTimeseries=30000

nodeSelector:
  kubernetes.io/arch: arm64

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - victoria-metrics-single
        topologyKey: kubernetes.io/hostname

tolerations:
- key: "arm"
  operator: "Exists"
  effect: "NoSchedule"

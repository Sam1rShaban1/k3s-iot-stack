replicaCount: 1

resources:
  requests:
    cpu: 750m
    memory: 1.5Gi
  limits:
    cpu: 1500m
    memory: 3Gi

persistence:
  enabled: true
  storageClass: longhorn
  size: 20Gi

service:
  type: ClusterIP
  ports:
    http: 8428
    grpc: 8429

# Single-node mode optimized for Pi4 8GB with gigabit network
extraArgs:
  - --retentionPeriod=45d
  - --memory.allowedPercent=50
  - --storageDataPath=/data
  - --httpListenAddr=:8428
  - --loggerLevel=warn
  - --loggerTimezone=UTC
  - --search.maxQueryDuration=60s
  - --search.maxUniqueTimeseries=2000000
  - --search.maxSeriesPerQuery=200000
  - --search.maxQueryLen=32000
  - --search.maxConcurrentRequests=200
  - --search.maxPointsPerTimeseries=50000
  # Performance optimizations for Pi4
  - --search.maxConcurrentSelectRequests=50
  - --search.maxConcurrentInsertRequests=50
  - --search.maxDailySeriesExemplars=100000
  - --search.maxSeriesPerMetric=100000
  - --search.maxTagsPerTimeseries=100
  - --search.maxTagValues=100000
  - --search.maxUniqueTagValues=100000
  - --search.cacheDataBytes.maxSizeBytes=268435456  # 256MB
  - --search.cacheIndexBytes.maxSizeBytes=134217728  # 128MB
  - --search.cacheTimeseriesHeaders.maxSizeBytes=67108864  # 64MB
  # Network optimizations
  - --http.pathPrefix="/"
  - --http.maxRequestSize=33554432  # 32MB
  - --http.maxConcurrentRequests=1000
  - --http.idleConnTimeout=30s
  - --http.shutdownTimeout=30s

nodeSelector:
  kubernetes.io/arch: arm64

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - victoria-metrics-single
        topologyKey: kubernetes.io/hostname

tolerations:
- key: "arm"
  operator: "Exists"
  effect: "NoSchedule"

# Priority class for critical storage service
priorityClassName: system-cluster-critical

# Performance tuning
livenessProbe:
  httpGet:
    path: /health
    port: 8428
  initialDelaySeconds: 60
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: 8428
  initialDelaySeconds: 30
  periodSeconds: 10

# JVM-like optimizations for Go runtime
env:
- name: GOGC
  value: "100"
- name: GOMAXPROCS
  value: "4"
- name: GOMEMLIMIT
  value: "2.5GiB"
